<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permit Sender Resolver | Production</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-canvas: #F9F9F8; --border-subtle: #E5E5E1; --text-main: #1A1A1A; --text-muted: #6B6B66; --accent: #3851FF; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-canvas); color: var(--text-main); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card { background: white; border: 1px solid var(--border-subtle); border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .loader { width: 16px; height: 16px; border: 2px solid #EEE; border-top: 2px solid var(--accent); border-radius: 50%; display: inline-block; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .tree-node { cursor: pointer; user-select: none; padding: 6px 10px; display: flex; align-items: center; gap: 8px; border-radius: 6px; transition: all 0.2s; }
        .tree-node:hover { background: #E5E5E1; }
        .tree-children { display: none; margin-left: 20px; border-left: 1px solid #D1D1CB; padding-left: 12px; }
        .tree-children.open { display: block; margin-top: 4px; margin-bottom: 8px; }
        .node-toggle::before { content: '→'; font-size: 10px; color: #999; transition: transform 0.2s; }
        .node-toggle.open::before { transform: rotate(90deg); }
        
        tr:nth-child(even) { background-color: #FAFAFA; }
        .badge-ipv4 { background: #ECFDF5; color: #065F46; border: 1px solid #D1FAE5; }
        .badge-ipv6 { background: #F5F3FF; color: #5B21B6; border: 1px solid #EDE9FE; }
    </style>
</head>
<body class="p-6 md:p-12 antialiased">

    <header class="max-w-6xl mx-auto mb-10 flex justify-between items-end">
        <div>
            <h1 class="text-xl font-semibold tracking-tight text-gray-900">Permit Sender Resolver</h1>
            <p class="text-sm text-gray-500">Recursive SPF infrastructure analysis</p>
        </div>
        <div id="runtime-clock" class="text-[10px] mono text-gray-400 uppercase tracking-widest">Live Runtime</div>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="mb-8 flex gap-2">
            <div class="relative flex-1">
                <input type="text" id="domainInput" placeholder="Enter domain (e.g. google.com)" 
                       class="w-full pl-4 pr-4 py-2.5 card focus:outline-none focus:ring-2 focus:ring-blue-500/20 text-sm transition-all border-gray-300">
            </div>
            <button id="resolveBtn" onclick="initiateResolution()"
                    class="bg-[#1A1A1A] text-white px-8 py-2.5 rounded-lg text-sm font-medium hover:shadow-lg active:scale-95 transition-all">
                Analyze
            </button>
        </div>

        <div id="status" class="hidden mb-6 p-4 card bg-blue-50/50 border-blue-100 flex items-center gap-3">
            <span class="loader"></span>
            <span id="statusText" class="text-sm font-medium text-blue-700">Traversing DNS records...</span>
        </div>

        <div id="dashboard" class="hidden animate-in fade-in duration-500">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="card p-4">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Authorized IPs</span>
                    <div id="stat-total" class="text-2xl font-semibold mt-1">0</div>
                </div>
                <div class="card p-4">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Include Depth</span>
                    <div id="stat-depth" class="text-2xl font-semibold mt-1">0</div>
                </div>
                <div class="card p-4">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Records Found</span>
                    <div id="stat-includes" class="text-2xl font-semibold mt-1">0</div>
                </div>
                <div class="card p-4 border-l-4 border-l-blue-500">
                    <span class="text-[10px] font-bold text-gray-400 uppercase">Safety Check</span>
                    <div id="stat-safety" class="text-sm font-semibold mt-2 text-green-600">Valid SPF</div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 card overflow-hidden flex flex-col">
                    <div class="px-4 py-3 bg-gray-50 border-b flex justify-between items-center">
                        <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500">Resolved CIDR Sets</h2>
                        <button onclick="copyToClipboard()" id="copyBtn" class="text-[10px] font-bold border px-3 py-1 rounded bg-white hover:bg-gray-50 uppercase">Copy All</button>
                    </div>
                    <div class="overflow-y-auto max-h-[700px]">
                        <table class="w-full text-left text-sm border-separate border-spacing-0">
                            <thead class="sticky top-0 bg-white shadow-sm z-10">
                                <tr>
                                    <th class="p-4 border-b font-semibold text-gray-600">Address / Range</th>
                                    <th class="p-4 border-b font-semibold text-gray-600">Protocol</th>
                                    <th class="p-4 border-b font-semibold text-gray-600">Source Domain</th>
                                </tr>
                            </thead>
                            <tbody id="resultsTable" class="mono divide-y divide-gray-100 text-[13px]">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="card p-5">
                        <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-4 border-b pb-2">DNS Inclusion Tree</h2>
                        <div id="treeView" class="text-xs space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const DNS_URL = 'https://dns.google/resolve';
        let visited = new Set();
        let masterIpList = [];

        async function fetchSPF(domain) {
            try {
                const res = await fetch(`${DNS_URL}?name=${encodeURIComponent(domain)}&type=TXT`);
                const data = await res.json();
                return data.Answer?.map(a => a.data).find(d => d.includes('v=spf1'))?.replace(/"/g, '') || null;
            } catch { return null; }
        }

        async function resolveRecursive(domain, depth = 0, container = null) {
            if (depth > 10 || visited.has(domain)) return;
            visited.add(domain);

            const spf = await fetchSPF(domain);
            if (!spf) return;

            const currentIPs = [];
            const parts = spf.split(/\s+/);

            // High Precision Regex for IP/CIDR Extraction
            for (const part of parts) {
                if (part.startsWith('ip4:') || part.startsWith('ip6:')) {
                    const type = part.startsWith('ip4') ? 'IPv4' : 'IPv6';
                    const ipMatch = part.split(/ip[46]:/)[1];
                    if (ipMatch) {
                        const formatted = ipMatch.includes('/') ? ipMatch : (type === 'IPv4' ? `${ipMatch}/32` : `${ipMatch}/128`);
                        const entry = { ip: formatted, type, source: domain };
                        currentIPs.push(entry);
                        masterIpList.push(entry);
                    }
                }
            }

            // UI Tree Building
            const node = document.createElement('div');
            const hasKids = parts.some(p => p.startsWith('include:'));
            node.innerHTML = `
                <div class="tree-node ${hasKids ? 'node-toggle' : ''}" onclick="this.classList.toggle('open'); this.nextElementSibling.classList.toggle('open')">
                    <span class="font-semibold text-blue-600">${domain}</span>
                    <span class="text-[10px] font-bold text-gray-400 bg-gray-100 px-1.5 rounded">${currentIPs.length} IPs</span>
                </div>
                <div class="tree-children">
                    ${currentIPs.length > 0 ? `<div class="p-3 mb-2 bg-gray-50 rounded mono text-[11px] text-gray-500 leading-relaxed">${currentIPs.map(i => i.ip).join('<br>')}</div>` : ''}
                    <div class="sub-nodes"></div>
                </div>
            `;
            (container || document.getElementById('treeView')).appendChild(node);
            const subContainer = node.querySelector('.sub-nodes');

            for (const part of parts) {
                if (part.startsWith('include:')) {
                    const nextDomain = part.split(':')[1];
                    await resolveRecursive(nextDomain, depth + 1, subContainer);
                }
            }
        }

        async function initiateResolution() {
            const input = document.getElementById('domainInput').value.trim();
            if (!input) return;

            // Reset
            visited.clear();
            masterIpList = [];
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('treeView').innerHTML = "";
            document.getElementById('resultsTable').innerHTML = "";

            try {
                await resolveRecursive(input);
                render();
            } catch (e) {
                alert("Resolution failed. Verify the domain exists.");
                document.getElementById('status').classList.add('hidden');
            }
        }

        function render() {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');

            // De-duplicate master list
            const unique = Array.from(new Map(masterIpList.map(item => [item.ip, item])).values());

            document.getElementById('stat-total').innerText = unique.length;
            document.getElementById('stat-depth').innerText = visited.size > 0 ? visited.size - 1 : 0;
            document.getElementById('stat-includes').innerText = visited.size;
            
            const safety = document.getElementById('stat-safety');
            if (visited.size > 10) {
                safety.innerText = "Too Many Lookups";
                safety.className = "text-sm font-semibold mt-2 text-red-600";
            } else {
                safety.innerText = "RFC Compliant";
                safety.className = "text-sm font-semibold mt-2 text-green-600";
            }

            const tbody = document.getElementById('resultsTable');
            unique.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="p-4 font-medium text-gray-800">${item.ip}</td>
                    <td class="p-4"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${item.type === 'IPv4' ? 'badge-ipv4' : 'badge-ipv6'}">${item.type}</span></td>
                    <td class="p-4 text-gray-500 text-xs">${item.source}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function copyToClipboard() {
            const btn = document.getElementById('copyBtn');
            const txt = Array.from(new Set(masterIpList.map(i => i.ip))).join('\n');
            navigator.clipboard.writeText(txt).then(() => {
                btn.innerText = "✓ Copied";
                setTimeout(() => btn.innerText = "Copy All", 2000);
            });
        }
    </script>
</body>
</html>

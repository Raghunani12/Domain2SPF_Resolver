<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permit Sender Resolver (Pro)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg-canvas: #F9F9F8; --border-subtle: #E5E5E1; --text-main: #1A1A1A; --text-muted: #6B6B66; --accent: #3851FF; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-canvas); color: var(--text-main); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card { background: white; border: 1px solid var(--border-subtle); border-radius: 8px; }
        .loader { width: 16px; height: 16px; border: 2px solid #EEE; border-top: 2px solid var(--accent); border-radius: 50%; display: inline-block; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Tree Interactions */
        .tree-node { cursor: pointer; user-select: none; transition: background 0.2s; border-radius: 4px; padding: 2px 6px; }
        .tree-node:hover { background: #f0f0ee; }
        .tree-children { display: none; margin-left: 20px; border-left: 1px dashed var(--border-subtle); padding-left: 10px; }
        .tree-children.open { display: block; }
        .node-toggle::before { content: '▶'; display: inline-block; font-size: 8px; margin-right: 6px; transition: transform 0.2s; }
        .node-toggle.open::before { transform: rotate(90deg); }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-6xl mx-auto mb-10">
        <h1 class="text-xl font-semibold tracking-tight">Permit Sender Resolver</h1>
        <p class="text-sm text-[#6B6B66]">Enterprise-grade SPF infrastructure discovery</p>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="mb-8 flex gap-3">
            <input type="text" id="domainInput" placeholder="Enter domain or brand (e.g., stripe.com)" 
                   class="flex-1 px-4 py-2 card focus:outline-none focus:ring-1 focus:ring-blue-500 text-sm">
            <button id="resolveBtn" onclick="initiateResolution()"
                    class="bg-[#1A1A1A] text-white px-6 py-2 rounded-lg text-sm font-medium hover:bg-black transition-all">
                Resolve Infrastructure
            </button>
        </div>

        <div id="status" class="hidden mb-6 text-sm flex items-center gap-2">
            <span class="loader"></span> <span id="statusText" class="text-muted">Crawling DNS & Fallback Databases...</span>
        </div>

        <div id="dashboard" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div class="card p-4"><p class="text-[10px] text-muted font-bold uppercase mb-1">Total IPs</p><p id="stat-total" class="text-2xl font-semibold">0</p></div>
                <div class="card p-4"><p class="text-[10px] text-muted font-bold uppercase mb-1">Chain Depth</p><p id="stat-depth" class="text-2xl font-semibold">0/10</p></div>
                <div class="card p-4"><p class="text-[10px] text-muted font-bold uppercase mb-1">Sources</p><p id="stat-includes" class="text-2xl font-semibold">0</p></div>
                <div id="res-type-card" class="card p-4 border-l-4 border-l-green-500"><p class="text-[10px] text-muted font-bold uppercase mb-1">Resolution Mode</p><p id="stat-mode" class="text-sm font-medium">Standard DNS</p></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 card overflow-hidden">
                    <div class="p-3 bg-gray-50 border-b border-gray-100 flex justify-between items-center">
                        <span class="text-[11px] font-bold text-muted uppercase tracking-wider">Authenticated IP Ranges</span>
                        <button onclick="copyToClipboard()" id="copyBtn" class="text-xs bg-white border px-3 py-1 rounded hover:bg-gray-50 transition-all font-medium">Copy CIDR List</button>
                    </div>
                    <div class="overflow-x-auto max-h-[600px]">
                        <table class="w-full text-left text-sm">
                            <thead class="sticky top-0 bg-white border-b shadow-sm"><tr class="text-muted"><th class="p-3">IP / CIDR</th><th class="p-3">Source</th><th class="p-3">Provider</th></tr></thead>
                            <tbody id="resultsTable" class="mono divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>

                <div class="space-y-6">
                    <div class="card p-4">
                        <p class="text-[11px] font-bold text-muted uppercase tracking-wider mb-4 border-b pb-2">Infrastructure Tree (Click to Expand)</p>
                        <div id="treeView" class="text-xs space-y-1"></div>
                    </div>
                    <div class="card p-4 bg-[#F1F1EF]">
                        <p class="text-[11px] font-bold text-muted uppercase tracking-wider mb-2">Primary Record</p>
                        <pre id="rawSPF" class="mono text-[11px] break-all whitespace-pre-wrap text-blue-700"></pre>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const DNS_URL = 'https://dns.google/resolve';
        let visitedDomains = new Set();
        let ipList = [];
        let resolutionMode = "Standard DNS";

        // "Internet Search" Fallback Data (Official IP Sources for Major Providers)
        const FALLBACK_DB = {
            "google.com": ["_spf.google.com"],
            "microsoft.com": ["spf.protection.outlook.com"],
            "stripe.com": ["_spf.stripe.com"],
            "amazon.com": ["amazonses.com"],
            "sendgrid.com": ["sendgrid.net"],
            "mailchimp.com": ["servers.mcsv.net"]
        };

        async function fetchDNS(name, type = 'TXT') {
            try {
                const res = await fetch(`${DNS_URL}?name=${encodeURIComponent(name)}&type=${type}`);
                return await res.json();
            } catch (e) { return {}; }
        }

        async function resolveSPFRecursive(domain, depth = 0, parentElement = null) {
            if (depth > 10 || visitedDomains.has(domain)) return;
            visitedDomains.add(domain);

            let data = await fetchDNS(domain, 'TXT');
            let spfRecord = data.Answer?.map(a => a.data).find(d => d.includes('v=spf1'))?.replace(/"/g, '');

            // --- Fallback Logic: If DNS is empty, simulate "Official Site/Internet Search" ---
            if (!spfRecord && depth === 0) {
                const searchMatch = Object.keys(FALLBACK_DB).find(k => domain.includes(k));
                if (searchMatch) {
                    resolutionMode = "Infrastructure Fallback";
                    spfRecord = `v=spf1 include:${FALLBACK_DB[searchMatch][0]} ~all`;
                } else {
                    throw new Error("No SPF record found and no fallback infrastructure identified.");
                }
            }
            if (!spfRecord) return;
            if (depth === 0) document.getElementById('rawSPF').innerText = spfRecord;

            // Create Tree Node
            const node = document.createElement('div');
            node.className = "mb-1";
            const currentIPs = [];

            const parts = spfRecord.split(/\s+/);
            for (const part of parts) {
                if (part.startsWith('ip4:') || part.startsWith('ip6:')) {
                    const ip = part.split(':')[1];
                    const entry = { ip: ip.includes('/') ? ip : `${ip}/32`, mechanism: part.startsWith('ip4') ? 'ip4' : 'ip6', source: domain };
                    ipList.push(entry);
                    currentIPs.push(entry.ip);
                }
            }

            node.innerHTML = `
                <div class="tree-node ${parts.some(p => p.includes('include:')) ? 'node-toggle' : ''}" onclick="toggleNode(this)">
                    <span class="font-medium text-blue-600">${domain}</span>
                    <span class="text-[10px] text-muted ml-2">(${currentIPs.length} IPs)</span>
                </div>
                <div class="tree-children">
                    ${currentIPs.length > 0 ? `<div class="p-2 bg-gray-50 rounded mono text-[10px] mb-2">${currentIPs.join('<br>')}</div>` : ''}
                    <div class="nested-container"></div>
                </div>
            `;
            
            const target = parentElement || document.getElementById('treeView');
            target.appendChild(node);
            const nestedContainer = node.querySelector('.nested-container');

            for (const part of parts) {
                if (part.startsWith('include:')) {
                    await resolveSPFRecursive(part.split(':')[1], depth + 1, nestedContainer);
                }
            }
        }

        function toggleNode(el) {
            el.classList.toggle('open');
            el.nextElementSibling.classList.toggle('open');
        }

        async function initiateResolution() {
            const domain = document.getElementById('domainInput').value.trim();
            if (!domain) return;

            ipList = []; visitedDomains.clear(); resolutionMode = "Standard DNS";
            document.getElementById('status').classList.remove('hidden');
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('resultsTable').innerHTML = "";
            document.getElementById('treeView').innerHTML = "";

            try {
                await resolveSPFRecursive(domain);
                renderResults();
            } catch (err) {
                alert(err.message);
                document.getElementById('status').classList.add('hidden');
            }
        }

        function renderResults() {
            document.getElementById('status').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');

            const uniqueIps = Array.from(new Map(ipList.map(item => [item.ip, item])).values());
            document.getElementById('stat-total').innerText = uniqueIps.length;
            document.getElementById('stat-depth').innerText = `${visitedDomains.size - 1}/10`;
            document.getElementById('stat-includes').innerText = visitedDomains.size;
            document.getElementById('stat-mode').innerText = resolutionMode;
            
            const resCard = document.getElementById('res-type-card');
            resCard.className = resolutionMode === "Standard DNS" ? "card p-4 border-l-4 border-l-green-500" : "card p-4 border-l-4 border-l-blue-500";

            const tbody = document.getElementById('resultsTable');
            uniqueIps.forEach(item => {
                const provider = item.source.includes('google') ? 'Google' : (item.source.includes('outlook') ? 'Microsoft' : 'Private');
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-3 font-medium">${item.ip}</td>
                        <td class="p-3 text-muted text-xs">${item.source}</td>
                        <td class="p-3"><span class="px-2 py-0.5 rounded-full bg-gray-100 text-[10px] font-bold">${provider}</span></td>
                    </tr>
                `;
            });
        }

        function copyToClipboard() {
            const copyBtn = document.getElementById('copyBtn');
            const text = Array.from(new Set(ipList.map(i => i.ip))).join('\n');
            
            // Fallback for non-HTTPS or permission-blocked environments
            if (!navigator.clipboard) {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    updateCopyUI(copyBtn);
                } catch (err) { console.error('Fallback copy failed', err); }
                document.body.removeChild(textArea);
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                updateCopyUI(copyBtn);
            });
        }

        function updateCopyUI(btn) {
            const original = btn.innerText;
            btn.innerText = "✓ Copied!";
            btn.classList.add('bg-green-50', 'text-green-700', 'border-green-200');
            setTimeout(() => {
                btn.innerText = original;
                btn.classList.remove('bg-green-50', 'text-green-700', 'border-green-200');
            }, 2000);
        }
    </script>
</body>
</html>
